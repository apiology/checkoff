---
include:
  # process first
  - "Gemfile"
  - "Rakefile"
  - "config/annotations*.rb"
  - "**/*.rb"
  - "**/.*.rb"
  - "lib/tasks/*.rake"
  - ".git-hooks/**/*.rb"
  - "script/*"
  - "bin/*"
  - "bin/overcommit_branch"
exclude:
  # Cursor skills/scripts are agent tooling, not gem API surface
  - '.cursor/**/*'
  # vendored
  - 'bin/bundle'
  - 'bin/brakeman'
  - 'bin/bump'
  - 'bin/tapioca' # regenerated by bin/tapioca init during build-typecheck
  - '*.gemspec'
  - 'rakelib/*.rake'
  - 'feature/feature_helper.rb'
  - script/.rubocop.yml
  - vendor/**/*
  - ".bundle/**/*"
  - ".markdownlint_style.rb"
  # Minitest/Mocha mocks are not strong-typecheckable; CI uses strong level
  - test/**/*
require: []
domains: []
reporters:
  - rubocop
  - require_not_found
  - typecheck:strong
  - update_errors
formatter:
  rubocop:
    cops: safe
    except: []
    only: []
    extra_args: []
require_paths: []
plugins: []
max_files: 5000
